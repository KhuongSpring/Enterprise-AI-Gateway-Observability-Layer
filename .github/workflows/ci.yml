name: CI
on:
  push:
    branches:
      - dev
  pull_request:
    types:
      - opened
      - synchronize
    branches:
      - dev

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SPRING_SERVER_PORT: 8080
      QUERY_LIMIT_WARNING_MS: 300
      MYSQL_DATABASE: aigateway
      SPRING_REDIS_HOST: localhost
      SPRING_REDIS_PORT: 6379
      REDIS_PASSWORD: 

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'
        cache: 'maven'

    # - name: Validate Code Formatting
    #   run: mvn -T 2C --batch-mode formatter:validate

    - name: Build with Maven (verify)
      run: mvn -T 2C --batch-mode verify