spring.application.name=aigateway
spring.config.import=optional:file:.env[.properties]
#APP
server.port=${SPRING_SERVER_PORT:8080}
application.repository.query-limit-warning-ms=${QUERY_LIMIT_WARNING_MS:1000}

#DATABASE (R2DBC)
spring.r2dbc.url=${SPRING_R2DBC_URL}
spring.r2dbc.username=${SPRING_R2DBC_USERNAME}
spring.r2dbc.password=${SPRING_R2DBC_PASSWORD}

server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Redis Properties
spring.data.redis.host=${SPRING_REDIS_HOST:localhost}
spring.data.redis.port=${SPRING_REDIS_PORT:6379}
spring.data.redis.password=${SPRING_REDIS_PASSWORD:""}

# Redis Connection Optimization
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=8
spring.data.redis.lettuce.pool.min-idle=2
spring.data.redis.timeout=2000ms

# Prometheus
management.endpoints.web.exposure.include=health, info, prometheus
management.endpoint.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
management.metrics.distribution.percentiles-histogram.http.server.requests=true

#Swagger
springdoc.api-docs.enabled=true
springdoc.packagesToScan=com.enterprise.aigateway.controller
springdoc.pathsToMatch=/**